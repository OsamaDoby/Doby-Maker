<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="mailApp()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoBy DoBy | Developed by Osama Omar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Cairo', sans-serif; transition: background-color 0.5s; scroll-behavior: smooth; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 2rem;
        }
        .dark .glass-card { background: rgba(15, 23, 42, 0.85); border-color: rgba(255,255,255,0.05); }

        .btn-glow:hover { 
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }
        
        .mail-content-frame {
            all: revert;
            max-width: 100%;
            overflow-x: auto;
        }

        /* تحسين مظهر السكرول بار داخل الرسائل */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100">

    <div class="container mx-auto px-4 max-w-5xl py-10">
        <nav class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-indigo-600 rounded-2xl shadow-xl">
                    <span class="text-white font-black text-2xl">D</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tighter">DoBy <span class="text-indigo-600">DoBy</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button @click="toggleMode()" class="p-3 glass-card btn-glow transition-all">
                    <span x-text="darkMode ? '☀️' : '🌙'"></span>
                </button>
                <button @click="toggleLang()" class="px-5 py-2 glass-card font-bold text-sm" x-text="lang === 'ar' ? 'English' : 'العربية'"></button>
            </div>
        </nav>

        <div class="flex flex-col items-center mb-10">
            <div class="glass-card shadow-2xl p-6 flex flex-col items-center border-b-4 border-indigo-500 w-full max-w-[280px] text-center">
                <span class="text-xs uppercase tracking-widest text-slate-400 font-bold mb-1" x-text="t[lang].remaining"></span>
                <div class="text-4xl font-black font-mono text-indigo-600 dark:text-indigo-400 mb-3" x-text="formatTime(timer)"></div>
                <button @click="extendTime()" class="text-[11px] bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 px-5 py-2 rounded-full font-bold hover:bg-indigo-600 hover:text-white transition-all">
                   ⚡ <span x-text="t[lang].extend"></span>
                </button>
            </div>
        </div>

        <main class="max-w-2xl mx-auto">
            <div class="glass-card p-6 md:p-10 mb-12 shadow-2xl relative border-t border-white/20 text-center">
                <h2 class="text-lg font-bold mb-4 flex items-center justify-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                    <span x-text="t[lang].yourMail"></span>
                </h2>

                <div class="flex flex-col md:flex-row gap-3 mb-6">
                    <input type="text" readonly :value="email" class="flex-1 bg-slate-100 dark:bg-slate-900/80 p-4 rounded-2xl text-lg font-mono border-2 border-transparent focus:border-indigo-500 outline-none shadow-inner text-center">
                    <button @click="copyEmail()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold transition-all active:scale-95 btn-glow">
                        <span x-text="t[lang].copy"></span>
                    </button>
                </div>

                <button @click="generateNew()" class="text-sm text-slate-500 hover:text-indigo-600 flex items-center justify-center gap-2 mx-auto font-medium transition-colors">
                    <span x-text="t[lang].change"></span> 🔄
                </button>
            </div>

            <section class="mb-20">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-4 px-2">
                    <span x-text="t[lang].inbox"></span>
                    <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
                </h3>

                <div class="space-y-6">
                    <template x-if="messages.length === 0">
                        <div class="text-center py-20 opacity-30">
                            <div class="text-6xl mb-4">📥</div>
                            <p x-text="t[lang].waiting"></p>
                        </div>
                    </template>

                    <template x-for="msg in messages" :key="msg.id">
                        <div class="glass-card overflow-hidden shadow-lg border-r-4 border-indigo-500 transition-all duration-300">
                            <div class="p-6 bg-white/40 dark:bg-slate-800/20">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="flex-1">
                                        <p class="text-[11px] text-indigo-500 font-bold uppercase" x-text="msg.from.address"></p>
                                        <h4 class="font-bold text-lg leading-tight mt-1" x-text="msg.subject"></h4>
                                    </div>
                                    <span class="text-[10px] opacity-50 font-mono" x-text="new Date(msg.createdAt).toLocaleTimeString()"></span>
                                </div>
                                
                                <div class="text-sm text-slate-600 dark:text-slate-400 mb-4 leading-relaxed" 
                                     x-show="openMsg !== msg.id" 
                                     x-text="msg.intro.substring(0, 150) + '...'"></div>
                                
                                <button @click="toggleMessage(msg.id)" 
                                        class="text-sm font-bold text-indigo-600 dark:text-indigo-400 hover:underline flex items-center gap-1">
                                    <span x-text="openMsg === msg.id ? t[lang].seeLess : t[lang].seeMore"></span>
                                    <span :class="openMsg === msg.id ? 'rotate-180' : ''" class="transition-transform">▼</span>
                                </button>
                            </div>

                            <div x-show="openMsg === msg.id" 
                                 x-transition:enter="transition ease-out duration-300"
                                 x-transition:enter-start="opacity-0 max-h-0"
                                 x-transition:enter-end="opacity-100 max-h-[2000px]"
                                 class="p-6 pt-2 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900">
                                
                                <div class="custom-scroll overflow-y-auto max-h-[600px] p-4 rounded-xl bg-slate-50 dark:bg-slate-950/50">
                                    <div class="mail-content-frame prose dark:prose-invert max-w-none" 
                                         x-html="msg.html && msg.html.length > 0 ? msg.html[0] : msg.intro"></div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </main>

        <footer class="mt-32 border-t border-slate-200 dark:border-slate-800 pt-16 pb-10">
            <div class="text-center max-w-2xl mx-auto px-4">
                <h4 class="text-xl font-black mb-4">لماذا DoBy DoBy؟</h4>
                <p class="text-slate-500 text-sm leading-relaxed mb-8">
                    موقع مجاني تماماً من تطوير <span class="text-indigo-600 font-bold italic">Osama Omar</span>. 
                    يهدف لحماية خصوصيتك عبر تويد بريد مؤقت يستقبل الرسائل فوراً. لا نطلب بياناتك، لا نعرض إعلانات، ونحذف كل شيء فور انتهائك.
                </p>
                <div class="flex flex-wrap justify-center gap-4 mb-10 text-xs font-bold uppercase tracking-widest text-slate-400">
                    <span class="px-4 py-2 bg-white dark:bg-slate-800 rounded-lg">🛡️ أمان كامل</span>
                    <span class="px-4 py-2 bg-white dark:bg-slate-800 rounded-lg">🚀 سرعة فائقة</span>
                    <span class="px-4 py-2 bg-white dark:bg-slate-800 rounded-lg">💎 مجاني 100%</span>
                </div>
                <p class="text-[10px] opacity-30">© 2026 DoBy DoBy - Built with Love by Osama</p>
            </div>
        </footer>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script>
        function mailApp() {
            return {
                email: localStorage.getItem('doby_email') || 'جاري التوليد...',
                token: localStorage.getItem('doby_token') || '',
                id: localStorage.getItem('doby_id') || '',
                messages: JSON.parse(localStorage.getItem('doby_msgs')) || [],
                timer: parseInt(localStorage.getItem('doby_timer')) || 600,
                darkMode: localStorage.getItem('doby_dark') === 'true',
                lang: localStorage.getItem('doby_lang') || 'ar',
                openMsg: null,
                t: {
                    ar: { remaining: "صلاحية البريد", extend: "تمديد الوقت", yourMail: "بريدك الحالي", copy: "نسخ", change: "تغيير البريد", inbox: "صندوق الوارد", waiting: "بانتظار وصول رسائل...", seeMore: "عرض الرسالة بالكامل", seeLess: "إغلاق الرسالة" },
                    en: { remaining: "Validity", extend: "Extend Time", yourMail: "Your Email", copy: "Copy", change: "New Email", inbox: "Inbox", waiting: "Waiting for mail...", seeMore: "See Full Message", seeLess: "Show Less" }
                },
                init() {
                    if (!this.token) this.generateNew();
                    this.startIntervals();
                    document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
                },
                async generateNew() {
                    try {
                        const domains = await fetch('https://api.mail.tm/domains').then(res => res.json());
                        const domain = domains['hydra:member'][0].domain;
                        const address = `${Math.random().toString(36).substring(7)}@${domain}`;
                        const password = 'pass_' + Math.random().toString(36).substring(5);

                        await fetch('https://api.mail.tm/accounts', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ address, password })
                        });

                        const auth = await fetch('https://api.mail.tm/token', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ address, password })
                        }).then(res => res.json());

                        this.email = address;
                        this.token = auth.token;
                        this.timer = 600;
                        this.messages = [];
                        this.save();
                    } catch (e) { console.error("API Error"); }
                },
                async checkMessages() {
                    if (!this.token) return;
                    try {
                        const res = await fetch('https://api.mail.tm/messages', {
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        }).then(res => res.json());
                        
                        const newMsgs = res['hydra:member'];

                        // جلب محتوى الرسائل الكامل (HTML) لكل رسالة جديدة
                        for(let msg of newMsgs) {
                            if(!this.messages.find(m => m.id === msg.id)) {
                                const details = await fetch(`https://api.mail.tm/messages/${msg.id}`, {
                                    headers: { 'Authorization': `Bearer ${this.token}` }
                                }).then(r => r.json());
                                msg.html = [details.html]; // تخزين الـ HTML
                                document.getElementById('notifSound').play();
                            } else {
                                // الحفاظ على الـ HTML للرسائل القديمة
                                const old = this.messages.find(m => m.id === msg.id);
                                msg.html = old.html;
                            }
                        }

                        this.messages = newMsgs;
                        this.save();
                    } catch (e) {}
                },
                save() {
                    localStorage.setItem('doby_email', this.email);
                    localStorage.setItem('doby_token', this.token);
                    localStorage.setItem('doby_msgs', JSON.stringify(this.messages));
                    localStorage.setItem('doby_timer', this.timer);
                    localStorage.setItem('doby_dark', this.darkMode);
                    localStorage.setItem('doby_lang', this.lang);
                },
                startIntervals() {
                    setInterval(() => {
                        if (this.timer > 0) {
                            this.timer--;
                            localStorage.setItem('doby_timer', this.timer);
                        }
                    }, 1000);
                    setInterval(() => this.checkMessages(), 4000);
                },
                toggleMessage(id) { this.openMsg = this.openMsg === id ? null : id; },
                extendTime() { this.timer += 600; this.save(); },
                copyEmail() {
                    navigator.clipboard.writeText(this.email);
                    alert(this.lang === 'ar' ? 'تم النسخ!' : 'Copied!');
                },
                toggleMode() { this.darkMode = !this.darkMode; this.save(); },
                toggleLang() {
                    this.lang = this.lang === 'ar' ? 'en' : 'ar';
                    this.save();
                    document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
                },
                formatTime(s) {
                    const m = Math.floor(s/60);
                    const sec = s % 60;
                    return `${m}:${sec.toString().padStart(2, '0')}`;
                }
            }
        }
    </script>
</body>
</html>
